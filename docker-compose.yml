version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: secureballot-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-secureballot_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secureballot_secure_pass}
      POSTGRES_DB: ${DATABASE_NAME:-secureballot_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - secureballot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-secureballot_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: secureballot-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secureballot-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Express Server (Built from Dockerfile)
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secureballot-server
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${DATABASE_USERNAME:-secureballot_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-secureballot_secure_pass}
      DATABASE_NAME: ${DATABASE_NAME:-secureballot_dev}
      DATABASE_URL: postgresql://${DATABASE_USERNAME:-secureballot_user}:${DATABASE_PASSWORD:-secureballot_secure_pass}@postgres:5432/${DATABASE_NAME:-secureballot_dev}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production_min_32_chars}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      
      # Email Service
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your_email@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-your_app_password}
      SMTP_FROM: ${SMTP_FROM:-noreply@secureballot.app}
      
      # Server Config
      API_URL: ${API_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - secureballot-network
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    restart: unless-stopped

  # Bull Job Queue UI (Optional: Visualize background jobs)
  bull-board:
    image: node:20-alpine
    container_name: secureballot-bull-board
    working_dir: /app
    command: >
      sh -c "npm install @bull-board/express @bull-board/ui bull redis &&
             node -e \"
             const express = require('express');
             const { createBullBoard } = require('@bull-board/express');
             const { BullAdapter } = require('@bull-board/api/bullAdapter');
             const Queue = require('bull');
             const redis = require('redis');
             
             const redisClient = redis.createClient({ 
               host: 'redis', 
               port: 6379,
               password: '${REDIS_PASSWORD:-redis_secure_pass}'
             });
             
             const emailQueue = new Queue('emails', { redis: redisClient });
             const app = express();
             
             const { router } = createBullBoard({
               queues: [new BullAdapter(emailQueue)]
             });
             
             app.use('/admin/queues', router);
             app.listen(3001, () => console.log('Bull Board running on :3001'));
             \""
    ports:
      - "3001:3001"
    depends_on:
      - redis
    networks:
      - secureballot-network
    restart: unless-stopped
    profiles: ["optional"]  # Run with: docker-compose --profile optional up

  # MailHog: Local email testing (catches SMTP emails in dev)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: secureballot-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - secureballot-network
    restart: unless-stopped
    profiles: ["optional"]

networks:
  secureballot-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local